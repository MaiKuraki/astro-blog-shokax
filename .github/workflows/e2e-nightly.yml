name: E2E Full Regression

on:
  push:
    branches:
      - main
      - develop
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-full:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run E2E critical
        id: e2e_critical
        continue-on-error: true
        run: bun run e2e:critical

      - name: Run E2E regression
        id: e2e_regression
        if: always()
        continue-on-error: true
        run: bun run e2e:regression

      - name: Fail if any E2E suite failed
        if: always()
        run: |
          if [ "${{ steps.e2e_critical.outcome }}" != "success" ] || [ "${{ steps.e2e_regression.outcome }}" != "success" ]; then
            echo "One or more E2E suites failed."
            exit 1
          fi

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-full-artifacts
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
